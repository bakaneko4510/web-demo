<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game: Đi Chợ Thông Minh</title>
    <!-- <link rel="icon" type="images/png" href="https://assets.pinterest.com/ext/embed.html?id=782852347765422324"> -->
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 950px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        .dashboard {
            display: flex;
            justify-content: space-between;
            background-color: #e8f4f8;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 1.2em;
            font-weight: bold;
        }
        .money { color: #e74c3c; }
        .score { color: #27ae60; }
        
        .main-content { display: flex; gap: 20px; flex-wrap: wrap; }
        .shop-section { flex: 2; min-width: 300px; }
        .cart-section {
            flex: 1;
            min-width: 280px;
            background: #fdfbf7;
            border: 2px dashed #bdc3c7;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
        }
        .item-card {
            background: #fff;
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        .item-name { font-weight: bold; margin-bottom: 10px; }
        .item-price { color: #e67e22; margin-bottom: 15px; font-weight: bold; }
        
        button {
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-buy { background-color: #3498db; color: white; width: 100%; }
        .btn-buy:hover { background-color: #2980b9; }
        .btn-buy:disabled { background-color: #bdc3c7; color: #7f8c8d; }

        .btn-undo {
            background-color: #95a5a6;
            color: white;
            margin-bottom: 15px;
            width: 100%;
        }
        .btn-undo:hover { background-color: #7f8c8d; }
        .btn-undo:disabled { opacity: 0.5; cursor: not-allowed; }

        .cart-list { list-style: none; padding: 0; margin: 0; flex-grow: 1; }
        .cart-list li {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
        }

        .message {
            text-align: center;
            font-weight: bold;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            min-height: 25px;
        }

        .controls { display: flex; gap: 10px; margin-top: 20px; }
        .btn-finish { background-color: #f39c12; color: white; flex: 1; font-size: 1.1em; }
        .btn-restart { background-color: #2ecc71; color: white; flex: 1; font-size: 1.1em; }
        
        .result-box {
            display: none;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            border: 1px solid;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🛒 Game: Đi Chợ Thông Minh</h1>
    <p style="text-align: center; margin-top: 0;">Mục tiêu: Mua được <b>nhiều món đồ nhất</b> với số tiền cho phép.</p>
    
    <div class="dashboard">
        <div class="money">Ngân sách: <span id="budgetDisplay">0</span></div>
        <div class="score">Số món: <span id="itemCountDisplay">0</span></div>
    </div>

    <div id="messageBox" class="message"></div>

    <div class="main-content">
        <div class="shop-section">
            <div class="shop-grid" id="shopGrid"></div>
        </div>

        <div class="cart-section">
            <h3 style="margin-top:0; text-align:center;">🛍️ Giỏ hàng</h3>
            <button class="btn-undo" id="btnUndo" onclick="undoLastAction()" disabled>↩️ Hoàn tác (Bỏ món vừa chọn)</button>
            <ul id="cartList" class="cart-list"></ul>
        </div>
    </div>

    <div id="resultBox" class="result-box"></div>

    <div class="controls">
        <button class="btn-finish" id="btnFinish" onclick="finishGame()">✅ Hoàn tất & Kiểm tra</button>
        <button class="btn-restart" onclick="initGame()">🔄 Chơi ván mới</button>
    </div>
</div>

<script>
    const products = [
        { id: 1, name: "Gạo", price: 180000 },
        { id: 2, name: "Mì hảo hán", price: 110000 },
        { id: 3, name: "Trứng rán cần mỡ", price: 35000 },
        { id: 4, name: "Thịt nợn", price: 130000 },
        { id: 5, name: "Rau má", price: 36000 },
        { id: 6, name: "Nước mắm", price: 45000 },
        { id: 7, name: "Dầu ăn", price: 55000 },
        { id: 8, name: "Sữa tươi", price: 32000 },
        { id: 9, name: "Bột giặt", price: 60000 },
        { id: 10, name: "Kem đánh răng", price: 28000 },
        { id: 11, name: "Giấy vệ sinh", price: 40000 },
        { id: 12, name: "Nem chua", price: 18000 }
    ];

    let currentBudget = 0;
    let initialBudget = 0;
    let cart = []; // Mảng chứa các đối tượng sản phẩm đã mua
    let maxPossibleItems = 0;
    let isGameOver = false;

    function formatMoney(amount) {
        return amount.toLocaleString('vi-VN') + "đ";
    }

    // Thuật toán tìm đáp án tối ưu
    function getOptimalSolution(budget) {
        let sorted = [...products].sort((a, b) => a.price - b.price);
        let count = 0;
        let tempBudget = budget;
        for (let item of sorted) {
            if (tempBudget >= item.price) {
                tempBudget -= item.price;
                count++;
            }
        }
        return count;
    }

    function initGame() {
        initialBudget = Math.floor(Math.random() * 30 + 20) * 10000; // 200k - 500k
        currentBudget = initialBudget;
        cart = [];
        isGameOver = false;
        maxPossibleItems = getOptimalSolution(initialBudget);

        document.getElementById('btnFinish').disabled = false;
        document.getElementById('btnUndo').disabled = true;
        document.getElementById('resultBox').style.display = "none";
        
        renderShop();
        renderCart();
        updateDashboard();
        showMessage("Đã cấp ngân sách mới. Mời bạn chọn đồ!", "#2980b9", "#eaf2f8");
    }

    function renderShop() {
        const grid = document.getElementById('shopGrid');
        grid.innerHTML = '';
        products.forEach(p => {
            const isBought = cart.some(item => item.id === p.id);
            grid.innerHTML += `
                <div class="item-card">
                    <div class="item-name">${p.name}</div>
                    <div class="item-price">${formatMoney(p.price)}</div>
                    <button class="btn-buy" id="btn-${p.id}" 
                        onclick="buyItem(${p.id})" ${isBought ? 'disabled' : ''}>
                        ${isBought ? 'Đã trong giỏ' : 'Thêm vào giỏ'}
                    </button>
                </div>`;
        });
    }

    function buyItem(id) {
        if (isGameOver) return;
        const product = products.find(p => p.id === id);
        
        if (currentBudget >= product.price) {
            currentBudget -= product.price;
            cart.push(product); // Thêm vào cuối mảng để dễ Undo
            
            updateDashboard();
            renderShop();
            renderCart();
            document.getElementById('btnUndo').disabled = false;
            showMessage(`Đã thêm ${product.name}`, "#27ae60", "#ebf5fb");
        } else {
            showMessage("Bạn không đủ tiền cho món này!", "#c0392b", "#fdedec");
        }
    }

    // TÍNH NĂNG MỚI: HOÀN TÁC
    function undoLastAction() {
        if (cart.length === 0 || isGameOver) return;

        const lastItem = cart.pop(); // Lấy món đồ cuối cùng ra
        currentBudget += lastItem.price; // Hoàn tiền

        if (cart.length === 0) {
            document.getElementById('btnUndo').disabled = true;
        }

        updateDashboard();
        renderShop();
        renderCart();
        showMessage(`Đã hoàn tác: Bỏ ${lastItem.name} ra khỏi giỏ`, "#7f8c8d", "#f8f9f9");
    }

    function renderCart() {
        const list = document.getElementById('cartList');
        if (cart.length === 0) {
            list.innerHTML = '<li style="color:#999; justify-content:center;">Chưa có đồ</li>';
            return;
        }
        list.innerHTML = cart.map(item => `
            <li><span>🔹 ${item.name}</span> <b>${formatMoney(item.price)}</b></li>
        `).join('');
        
        const totalSpent = initialBudget - currentBudget;
        list.innerHTML += `<li style="border-top:2px solid #333; margin-top:10px; font-weight:bold;">
            <span>Tổng chi:</span> <span>${formatMoney(totalSpent)}</span>
        </li>`;
    }

    function updateDashboard() {
        document.getElementById('budgetDisplay').innerText = formatMoney(currentBudget);
        document.getElementById('itemCountDisplay').innerText = cart.length;
    }

    function showMessage(text, color, bgColor) {
        const box = document.getElementById('messageBox');
        box.innerText = text;
        box.style.color = color;
        box.style.backgroundColor = bgColor;
    }

    function finishGame() {
        isGameOver = true;
        document.querySelectorAll('.btn-buy, .btn-undo, .btn-finish').forEach(b => b.disabled = true);
        
        const resBox = document.getElementById('resultBox');
        resBox.style.display = "block";

        if (cart.length === maxPossibleItems) {
            resBox.style.backgroundColor = "#d4edda";
            resBox.style.color = "#155724";
            resBox.style.borderColor = "#c3e6cb";
            resBox.innerHTML = `<h3>🏆 CHIẾN THẮNG!</h3><p>Bạn đã mua được <b>${cart.length} món</b> - đây là con số tối đa có thể!</p>`;
        } else {
            resBox.style.backgroundColor = "#fff3cd";
            resBox.style.color = "#856404";
            resBox.style.borderColor = "#ffeeba";
            resBox.innerHTML = `<h3>⚠️ CẦN CỐ GẮNG HƠN</h3><p>Bạn mua được ${cart.length} món. Đáp án tối ưu là <b>${maxPossibleItems} món</b>.</p><p><i>Mẹo: Hãy ưu tiên chọn những món rẻ nhất trước để số lượng được nhiều nhất!</i></p>`;
        }
    }

    window.onload = initGame;
</script>

</body>
</html>
